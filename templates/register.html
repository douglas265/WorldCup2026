{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-card" style="max-width:480px">
  <h2>Create Account</h2>
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" required autofocus />
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" required />
      </div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required minlength="6" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm" required minlength="6" />
    </div>
    <div class="form-group">
      <label>Preferred Payment Method</label>
      <select name="payment_method" id="payment_method" required onchange="updatePaymentLabel()">
        <option value="" disabled selected>Select…</option>
        <option value="venmo">Venmo</option>
        <option value="zelle">Zelle</option>
      </select>
    </div>
    <div class="form-group" id="payment_handle_group" style="display:none">
      <label id="payment_handle_label">Handle / Username</label>
      <input type="text" name="payment_handle" id="payment_handle" placeholder="" />
    </div>
    <button type="submit" class="btn btn-primary btn-full">Register</button>
  </form>
  <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
<script>
function updatePaymentLabel() {
  const method = document.getElementById('payment_method').value;
  const group = document.getElementById('payment_handle_group');
  const label = document.getElementById('payment_handle_label');
  const input = document.getElementById('payment_handle');
  if (method === 'venmo') {
    label.textContent = 'Venmo Username (e.g. @yourname)';
    input.placeholder = '@yourname';
    group.style.display = 'block';
  } else if (method === 'zelle') {
    label.textContent = 'Zelle Phone or Email';
    input.placeholder = 'phone number or email';
    group.style.display = 'block';
  } else {
    group.style.display = 'none';
  }
}
</script>
{% endblock %}
